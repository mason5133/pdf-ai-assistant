<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">

        <!-- Upload View -->
        <div id="upload-view">
            <header>
                <h1>PDF AI Assistant</h1>
                <p>Upload any PDF. Get structured content extraction and an interactive AI chat to explore it.</p>
            </header>

            <div class="upload-section">
                <div id="drop-zone" class="drop-zone">
                    <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="12" y1="18" x2="12" y2="12"></line>
                        <polyline points="9 15 12 12 15 15"></polyline>
                    </svg>
                    <p>Drag & Drop your PDF here, or <span class="browse-link">browse</span></p>
                    <input type="file" id="file-input" accept=".pdf" hidden>
                </div>
                <button id="upload-btn" class="btn-primary" disabled>Analyze Document</button>
                <div id="loading-spinner" class="spinner-container" style="display: none;">
                    <div class="spinner"></div>
                    <p>Parsing PDF and extracting structured content...</p>
                </div>
                <div id="error-message" class="error-message"></div>
            </div>
        </div>

        <!-- Workspace View (hidden until document is loaded) -->
        <div id="workspace-view" style="display: none;">
            <div class="workspace-header">
                <div class="doc-info">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    <span id="doc-name" class="doc-name">Document</span>
                </div>
                <button id="new-doc-btn" class="btn-secondary">New Document</button>
            </div>

            <div class="workspace-body">
                <!-- Left: Extracted Markdown -->
                <div class="pane markdown-pane">
                    <div class="pane-header">
                        <h2>Extracted Content</h2>
                    </div>
                    <div class="content" id="markdown-content"></div>
                </div>

                <!-- Right: Chat -->
                <div class="pane chat-pane">
                    <div class="pane-header ai-header">
                        <h2>AI Chat</h2>
                    </div>
                    <div class="chat-messages" id="chat-messages"></div>
                    <div class="chat-input-area">
                        <textarea id="chat-input" placeholder="Ask anything about this document..." rows="1"></textarea>
                        <button id="send-btn" class="btn-send" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
